<!DOCTYPE html>
<html>
<head><title>Split OTP Input</title></head>
<body>
  <form>
    <p>Enter the 6-digit code</p>
    <input type="text" maxlength="1" aria-label="First digit">
    <input type="text" maxlength="1" aria-label="Second digit">
    <input type="text" maxlength="1" aria-label="Third digit">
    <input type="text" maxlength="1" aria-label="Fourth digit">
    <input type="text" maxlength="1" aria-label="Fifth digit">
    <input type="text" maxlength="1" aria-label="Sixth digit">
    <button type="submit">Verify</button>
  </form>
</body>
</html>
