<!DOCTYPE html>
<html>
<head><title>Standard OTP Form</title></head>
<body>
  <form>
    <label for="otp">Verification Code</label>
    <input type="text" id="otp" name="otp" autocomplete="one-time-code" maxlength="6" placeholder="Enter 6-digit code">
    <button type="submit">Verify</button>
  </form>
</body>
</html>
